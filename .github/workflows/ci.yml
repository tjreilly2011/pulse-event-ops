name: CI

on:
  push:
  pull_request:

jobs:
  python-quality-gates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Unit tests
        run: uv run pytest tests/ --ignore=tests/test_db.py -v