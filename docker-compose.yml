version: '3.8'

services:
  db:
    image: timescale/timescaledb-ha:pg16-latest
    environment:
      POSTGRES_USER: pulse_event_ops_user
      POSTGRES_PASSWORD: pulse_event_password
      POSTGRES_DB: pulse_event_ops_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
